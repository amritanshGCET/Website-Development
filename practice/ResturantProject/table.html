                <input type="text" id="name">
               <label for="phone">PHONE NUMBER </label>
              <input type="tel" id="phone" minlength="10" maxlength="10" pattern="[0-9]{10}">

              <input type="date" id="date" min="2025-08-03" max="2025-08-10">
              <label for="people" >NUMBER OF PEOPLE </label>
              <input type="number" id="people" min="1" max="6">
              <h2>SELECT TIME SLOT</h2>
              <label for="11">11:00 AM-12:00 PM</label>
              <input type="radio" class="rad" id="11" name="res">
              <label for="12">12:00 PM-01:00 PM</label>
              <input type="radio" class="rad" id="12" name="res">
              <label for="1">01:00 AM-02:00 PM</label>
              <input type="radio" class="rad" id="1" name="res">
              <label for="2">02:00 AM-03:00 PM</label>
              <input type="radio" class="rad" id="2" name="res">
              <label for="reset"></label>
        <input type="reset" class="button">

        <input type="submit" class="button">
